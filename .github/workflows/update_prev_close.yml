name: 每日更新台股收盤價

on:
  schedule:
    # 台灣時間 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 下載並更新收盤價
        run: |
          python3 << 'PYEOF'
          import requests, json, time

          prices = {}
          HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # ── 上市股票（TWSE）──
          for attempt in range(3):
              try:
                  r = requests.get(
                      'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL',
                      headers=HEADERS, timeout=30, verify=False
                  )
                  if r.status_code == 200 and r.text.strip():
                      for item in r.json():
                          code  = item.get('Code', '')
                          price = item.get('ClosingPrice', '').replace(',', '')
                          if code and price:
                              try: prices[code] = float(price)
                              except: pass
                      print(f"上市: {len(prices)} 筆")
                      break
                  else:
                      print(f"上市 HTTP {r.status_code}，重試 {attempt+1}/3")
              except Exception as e:
                  print(f"上市失敗 ({attempt+1}/3): {e}")
              time.sleep(3)

          # ── 上櫃股票（TPEx）── 多個備用 URL
          tpex_urls = [
              'https://www.tpex.org.tw/openapi/v1/t187ap03_L',
              'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes',
          ]
          tpex_count = 0
          for url in tpex_urls:
              if tpex_count > 0:
                  break
              for attempt in range(3):
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=30, verify=False)
                      if r.status_code == 200 and r.text.strip():
                          data = r.json()
                          if isinstance(data, list) and data:
                              for item in data:
                                  code  = item.get('SecuritiesCompanyCode', '') or item.get('Code', '')
                                  price = (item.get('ClosingPrice', '') or item.get('Close', '')).replace(',', '')
                                  if code and price:
                                      try:
                                          prices[code] = float(price)
                                          tpex_count += 1
                                      except: pass
                              print(f"上櫃 ({url.split('/')[-1]}): {tpex_count} 筆")
                              break
                      else:
                          print(f"上櫃 HTTP {r.status_code}，重試 {attempt+1}/3")
                  except Exception as e:
                      print(f"上櫃失敗 ({attempt+1}/3): {e}")
                  time.sleep(3)

          if tpex_count == 0:
              print("⚠️ 上櫃資料載入失敗，只有上市資料")

          print(f"總計: {len(prices)} 筆")

          with open('prev_close.json', 'w', encoding='utf-8') as f:
              json.dump(prices, f, ensure_ascii=False)
          print("prev_close.json 寫入完成")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prev_close.json
          git diff --staged --quiet || git commit -m "每日收盤價更新 $(date +%Y-%m-%d)"
          git push
